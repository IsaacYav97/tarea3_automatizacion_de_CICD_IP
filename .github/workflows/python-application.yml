name: python-application

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código fuente
      - uses: actions/checkout@v4

      # 2. Instalar dependencias
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 3. Ejecutar pruebas automatizadas
      - name: Ejecutar pruebas con pytest
        run: pytest test_app.py -v

      # 4. Ejecutar la aplicación
      - name: Ejecutar la aplicación
        run: python -c "from app import sumar; print('App OK:', sumar(2, 3))"

      # 5. Simular fase de despliegue
      - name: Simular despliegue
        run: |
          echo "Iniciando despliegue..."
          echo "Verificando entorno de producción..."
          echo "Desplegando ejercicio:3.0.0..."
          echo "Despliegue completado exitosamente."
 
      # 6. Construir imagen Docker
      - name: Construir imagen de docker
        run: docker build -t ghcr.io/isaacyav97/ejercicio:3.0.0 .
 
      # 7. Autenticarse en GitHub Container Registry
      - name: Login hacia GitHub Container Registry
        run: echo "${{ secrets.TOKEN_WR_IPQ }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
 
      # 8. Publicar la imagen generada
      - name: Publicar la imagen
        run: docker push ghcr.io/isaacyav97/ejercicio:3.0.0