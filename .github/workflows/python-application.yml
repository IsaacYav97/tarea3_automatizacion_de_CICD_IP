name: automatizacion_de_CICD_IP

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Construir imagen de docker
      run: docker build -t ghcr.io/isaacyav97/holaflask:1.0.0 .

    - name: Login hacia GitHub Container Registry
      run: echo "${{ secrets.TOKEN_WR_IP }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Publicar la imagen
      run: docker push ghcr.io/isaacyav97/holaflask:1.0.0
